<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Productos')}">
</head>
<body th:replace="~{base :: body(~{::main})}"></body>

    <main>
        <h1>Productos</h1>
        <div th:each="product : ${products}">
            <h2 th:text="${product.name}">Nombre del producto</h2>
            <p th:text="'Precio: $' + ${product.price}">Precio del producto</p>
            <a th:href="@{'/products/' + ${product.id}}">Ver detalles</a>
        </div>
    </main>

</body>
</html>
