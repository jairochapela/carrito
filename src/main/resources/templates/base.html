<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Tienda Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body th:fragment="body(contenido)">

    <nav th:fragment="nav" class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Tienda</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item">
            <a class="nav-link active" aria-current="page" th:href="@{/}">Inicio</a>
            </li>
            <li class="nav-item">
            <a class="nav-link" th:href="@{/products}">Productos</a>
            </li>
            <li class="nav-item">
            <a class="nav-link" th:href="@{/cart}">Carrito</a>
            </li>

            <li class="nav-item">
                <span th:if="${#authentication.name != 'anonymousUser'}" class="nav-link" th:text="'Hola, ' + ${#authentication.name}"></span>
            </li>

            <li class="nav-item">                
                <a th:if="${#authentication.name == 'anonymousUser'}" class="nav-link btn btn-outline-primary" th:href="@{/login}">Iniciar sesión</a>
                
                <form th:if="${#authentication.name != 'anonymousUser'}" th:action="@{/logout}" method="post">
                    <button class="nav-link btn btn-outline-danger" type="submit">Cerrar sesión</button>
                </form>
            </li>
        </ul>
        </div>
    </div>
    </nav>

    <div class="container-fluid">    
            <!-- Aquí va el contenido principal de cada página -->
            <th:block th:replace="${contenido}"></th:block>
    </div>

    <footer th:fragment="footer" class="container-fluid text-center mt-4 text-white bg-dark py-3">
        <p>&copy; 2026 Tienda Online. Todos los derechos reservados.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
